<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Dooika</title>
    <link class="game-favicon" rel="shortcut icon" href="TemplateData/favicon.svg">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Evita rebotes de scroll molestos en navegadores móviles */
      html, body {
        overflow: hidden;
        position: fixed;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-between font-sans overflow-hidden selection:bg-indigo-500/30">

    <!-- Cabecera y Logo del Juego -->
    <header class="hidden lg:flex flex-col items-center mt-8 mb-4">
        <div class="logo-container flex items-center justify-center gap-3">
            <img src="TemplateData/Logo.png" alt="Dooika" class="game-logo max-h-16 object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display: none;" class="text-2xl font-black text-white tracking-widest uppercase">Dooika</span>
        </div>
    </header>

    <div id="unity-warning" class="fixed top-4 z-50 max-w-md w-full px-4" style="display:none;"></div>

    <!-- Layout Principal -->
    <main class="main-layout flex flex-col lg:flex-row items-center justify-center gap-0 lg:gap-8 my-auto w-full max-w-7xl p-0 lg:px-4">

      <!-- Galería Lateral Izquierda -->
        <aside class="side-gallery left-side hidden lg:flex lg:flex-col gap-4 justify-center">
            <div class="circle-item flex flex-col items-center bg-slate-900/60 border border-white/5 p-3 rounded-2xl shadow-xl hover:border-indigo-500/30 transition-all duration-300">
                <img src="TemplateData/img1.png" alt="1" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <span style="display: none;" class="text-[10px] text-slate-400 font-bold">1</span>
            </div>
            <div class="circle-item flex flex-col items-center bg-slate-900/60 border border-white/5 p-3 rounded-2xl shadow-xl hover:border-indigo-500/30 transition-all duration-300">
                <img src="TemplateData/img3.png" alt="3" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <span style="display: none;" class="text-[10px] text-slate-400 font-bold">3</span>
            </div>
        </aside>

        <!-- Contenedor del Juego -->
        <div id="unity-container-wrapper" class="w-full flex flex-col items-center max-w-none lg:max-w-[338px]">
          <div id="unity-container" class="relative overflow-hidden rounded-none lg:rounded-2xl lg:border lg:border-white/10 bg-slate-950 lg:shadow-2xl w-full" style="aspect-ratio: 338 / 600;">
              <canvas id="unity-canvas" tabindex="-1" class="w-full h-full block"></canvas>
              <div id="unity-loading-bar" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/90 gap-4">
                  <div id="unity-progress-bar-empty" class="w-48 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                      <div id="unity-progress-bar-full" class="h-full bg-indigo-500 transition-all duration-150" style="width: 0%;"></div>
                  </div>
              </div>
          </div>

          <button id="unity-fullscreen-button" class="hidden lg:flex mt-4 px-6 py-2.5 bg-slate-900 border border-white/5 hover:border-indigo-500/30 hover:bg-slate-800 text-xs font-bold uppercase tracking-wider rounded-xl transition-all duration-200 items-center gap-2 text-slate-400 hover:text-white">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M1 1v6h2V3h4V1H1zm12 0v2h4v4h2V1h-6zM1 19h6v-2H3v-4H1v6zm16-4v4h-4v2h6v-6h-2z"/></svg>
                Pantalla Completa
            </button>
        </div>

        <!-- Galería Lateral Derecha -->
        <aside class="side-gallery right-side hidden lg:flex lg:flex-col gap-4 justify-center">
            <div class="circle-item flex flex-col items-center bg-slate-900/60 border border-white/5 p-3 rounded-2xl shadow-xl hover:border-indigo-500/30 transition-all duration-300">
                <img src="TemplateData/img2.png" alt="2" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <span style="display: none;" class="text-[10px] text-slate-400 font-bold">2</span>
            </div>
            <div class="circle-item flex flex-col items-center bg-slate-900/60 border border-white/5 p-3 rounded-2xl shadow-xl hover:border-indigo-500/30 transition-all duration-300">
                <img src="TemplateData/img4.png" alt="4" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <span style="display: none;" class="text-[10px] text-slate-400 font-bold">4</span>
            </div>
        </aside>
    </main>

    <!-- Footer: Quienes Somos -->
    <footer class="hidden lg:flex w-full max-w-2xl px-6 mb-16 flex-col items-center gap-4">
        <div class="w-[64px] h-[64px] bg-slate-900/50 border border-white/5 flex items-center justify-center rounded-2xl shadow-xl shrink-0 hover:border-indigo-500/30 transition-all duration-300">
            <img src="TemplateData/company_logo.png" alt="Icon" class="max-h-10 object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display: none;" class="text-2xl">🏢</span>
        </div>
        <div class="text-center text-slate-700 text-[9px] tracking-[0.5em] uppercase font-bold">
            &copy; Picatchi Games - Dooika
        </div>
    </footer>

    <!-- Script oficial de inicialización para Unity -->
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') {
          div.style.cssText = 'background: rgba(220, 38, 38, 0.95); color: white; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); font-size: 13px; font-weight: 500;';
        } else {
          if (type == 'warning') {
            div.style.cssText = 'background: rgba(217, 119, 6, 0.95); color: white; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); font-size: 13px; font-weight: 500;';
          }
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Builds.loader.js";
      var config = {
        dataUrl: buildUrl + "/Builds.data",
        frameworkUrl: buildUrl + "/Builds.framework.js",
        codeUrl: buildUrl + "/Builds.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Picatchi Games",
        productName: "Dooika",
        productVersion: "1.5",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        
        container.style.removeProperty('aspect-ratio');
        container.style.width = "100vw";

        function adjustMobileLayout() {
          var wHeight = window.innerHeight + "px";
          container.style.height = wHeight;
          canvas.style.width = "100vw";
          canvas.style.height = wHeight;
        }

        adjustMobileLayout();
        window.addEventListener('resize', adjustMobileLayout);
        window.addEventListener('orientationchange', adjustMobileLayout);
      } else {
        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                loadingBar.style.display = "none";
                if (fullscreenButton) {
                  fullscreenButton.onclick = () => {
                    unityInstance.SetFullscreen(1);
                  };
                }
              }).catch((message) => {
                unityShowBanner(message, 'error');
              });
            };

      document.body.appendChild(script);
    </script>
  </body>
</html>
